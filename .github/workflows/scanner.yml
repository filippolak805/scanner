name: scanner

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:         # also allows manual trigger from GitHub UI

permissions:
  contents: write  # add this

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4  # whatever your script needs

      - name: Run script
        run: python scanner.py
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
          TARGET: ${{ vars.TARGET }}

      - name: Commit updated date
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_date.txt
          git diff --staged --quiet || git commit -m "update last date"
          git push
